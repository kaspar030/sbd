version: 0.3.0
description: test sbd file
targets:
  nrf52840dk:
    chip: nrf52840
    flags:
      - has_usb_device_port
    leds:
      - pin: P0_13
        color: green
        active: low
      - pin: P0_14
        color: green
        active: low
      - pin: P0_15
        color: green
      - pin: P0_16
        color: green

    buttons:
      - pin: P0_11
        active: low
      - pin: P0_12
        active: low
      - pin: P0_24
        active: low
      - pin: P0_25
        active: low
